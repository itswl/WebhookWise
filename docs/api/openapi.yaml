components:
  schemas:
    AIUsageData:
      properties:
        total_calls:
          type: integer
          title: Total Calls
        route_breakdown:
          additionalProperties:
            type: integer
          type: object
          title: Route Breakdown
        percentages:
          additionalProperties:
            type: number
          type: object
          title: Percentages
        tokens:
          $ref: '#/components/schemas/TokenStats'
        cost:
          $ref: '#/components/schemas/CostStats'
        cache_statistics:
          $ref: '#/components/schemas/CacheStatistics'
        trend:
          items:
            $ref: '#/components/schemas/TrendPoint'
          type: array
          title: Trend
      type: object
      required:
      - total_calls
      - route_breakdown
      - percentages
      - tokens
      - cost
      - cache_statistics
      - trend
      title: AIUsageData
      description: AI 使用统计数据
    AIUsageResponse:
      properties:
        success:
          type: boolean
          title: Success
        data:
          anyOf:
          - $ref: '#/components/schemas/AIUsageData'
          - type: 'null'
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
      type: object
      required:
      - success
      title: AIUsageResponse
      description: AI 使用统计响应
    CacheStatistics:
      properties:
        total_cache_entries:
          type: integer
          title: Total Cache Entries
        total_hits:
          type: integer
          title: Total Hits
        avg_hits_per_entry:
          type: number
          title: Avg Hits Per Entry
        cache_hit_rate:
          type: number
          title: Cache Hit Rate
        saved_calls:
          type: integer
          title: Saved Calls
      type: object
      required:
      - total_cache_entries
      - total_hits
      - avg_hits_per_entry
      - cache_hit_rate
      - saved_calls
      title: CacheStatistics
    ConfigResponse:
      properties:
        success:
          type: boolean
          title: Success
        data:
          anyOf:
          - type: object
          - type: 'null'
          title: Data
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
      type: object
      required:
      - success
      title: ConfigResponse
      description: 配置读取响应
    ConfigSourceItem:
      properties:
        key:
          type: string
          title: Key
        source:
          type: string
          title: Source
        requires_restart:
          type: boolean
          title: Requires Restart
          default: false
      type: object
      required:
      - key
      - source
      title: ConfigSourceItem
    ConfigSourcesResponse:
      properties:
        success:
          type: boolean
          title: Success
        data:
          anyOf:
          - items:
              $ref: '#/components/schemas/ConfigSourceItem'
            type: array
          - type: 'null'
          title: Data
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
