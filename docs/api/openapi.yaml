      - name: engine
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Engine
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeepAnalysisListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/deep-analyses/{webhook_id}:
    get:
      summary: Get Deep Analyses
      operationId: get_deep_analyses_api_deep_analyses__webhook_id__get
      security:
      - HTTPBearer: []
