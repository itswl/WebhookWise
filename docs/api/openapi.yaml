openapi: 3.1.0
info:
  title: Webhook AI Assistant
  version: 0.1.0
paths:
  /api/deep-analyze/{webhook_id}:
    post:
      summary: Deep Analyze Webhook
      operationId: deep_analyze_webhook_api_deep_analyze__webhook_id__post
      security:
      - HTTPBearer: []
      parameters:
      - name: webhook_id
        in: path
        required: true
        schema:
          type: integer
          title: Webhook Id
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - type: object
              - type: 'null'
              title: Payload
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/deep-analyses:
    get:
      summary: List All Deep Analyses
      operationId: list_all_deep_analyses_api_deep_analyses_get
      security:
      - HTTPBearer: []
