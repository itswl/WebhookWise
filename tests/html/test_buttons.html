<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试按钮点击</title>
    <style>
        body {
            font-family: system-ui;
            padding: 2rem;
            background: #f5f5f5;
        }
        .alert-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
        }
        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .alert-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
        }
        .btn:hover {
            background: #f0f0f0;
        }
        .btn-primary {
            background: #0366d6;
            color: white;
            border-color: #0366d6;
        }
        .alert-details {
            margin-top: 1rem;
            padding: 1rem;
            background: #f9f9f9;
            border-radius: 6px;
            display: none;
        }
        .alert-item.expanded .alert-details {
            display: block;
        }
        .alert-item.expanded {
            background: #fafafa;
        }
        .log {
            margin-top: 2rem;
            padding: 1rem;
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.875rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            margin-bottom: 0.5rem;
        }
        .log-entry.success { color: #4ec9b0; }
        .log-entry.error { color: #f48771; }
        .log-entry.info { color: #9cdcfe; }
    </style>
</head>
<body>
    <h1>按钮点击测试</h1>
    <p>点击告警卡片应该展开/收起，点击按钮应该触发对应操作</p>

    <div class="alert-item" data-id="1">
        <div class="alert-header">
            <div class="alert-left">
                <strong>测试告警 #1</strong>
            </div>
            <div class="alert-actions">
                <button class="btn" data-action="reanalyze" data-id="1">🔄 重新分析</button>
                <button class="btn btn-primary" data-action="forward" data-id="1">🚀 转发</button>
            </div>
        </div>
        <div class="alert-details">
            这是展开后的详情内容
        </div>
    </div>

    <div class="alert-item" data-id="2">
        <div class="alert-header">
            <div class="alert-left">
                <strong>测试告警 #2</strong>
            </div>
            <div class="alert-actions">
                <button class="btn" data-action="reanalyze" data-id="2">🔄 重新分析</button>
                <button class="btn btn-primary" data-action="forward" data-id="2">🚀 转发</button>
            </div>
        </div>
        <div class="alert-details">
            这是展开后的详情内容
        </div>
    </div>

    <div class="log" id="log">
        <div class="log-entry info">等待操作...</div>
    </div>

    <script>
        const logContainer = document.getElementById('log');

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function reanalyzeWebhook(id) {
            addLog('重新分析 webhook ID: ' + id, 'success');
            alert('重新分析 #' + id);
        }

        function openForwardModal(id) {
            addLog('打开转发模态框, webhook ID: ' + id, 'success');
            alert('转发 #' + id);
        }

        // 事件委托（与实际代码相同的逻辑）
        document.addEventListener('click', function(e) {
            addLog('点击事件触发, target: ' + e.target.tagName, 'info');

            // 优先处理按钮操作
            const btn = e.target.closest('button[data-action]');
            if (btn) {
                e.stopPropagation();
                const action = btn.getAttribute('data-action');
                const id = btn.getAttribute('data-id');

                addLog('按钮点击: action=' + action + ', id=' + id, 'success');

                if (action === 'reanalyze') {
                    reanalyzeWebhook(id);
                } else if (action === 'forward') {
                    openForwardModal(id);
                }
                return;
            }

            // 告警展开/收起
            if (e.target.closest('.alert-header')) {
                const header = e.target.closest('.alert-header');
                if (e.target.closest('button')) {
                    addLog('点击的是按钮，忽略展开操作', 'info');
                    return;
                }

                const alertItem = header.closest('.alert-item');
                const wasExpanded = alertItem.classList.contains('expanded');
                alertItem.classList.toggle('expanded');

                const alertId = alertItem.getAttribute('data-id');
                addLog('切换告警 #' + alertId + ': ' + (wasExpanded ? '收起' : '展开'), 'info');
            }
        });

        addLog('页面加载完成，事件监听器已绑定', 'success');
    </script>
</body>
</html>
