<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook 监控中心</title>
    
    <!-- 外部样式表 -->
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/components.css">
    
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">
                <span>🔔</span>
                <span>Webhook Monitor</span>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="alerts">
                    <span>🔔</span> 告警管理
                </button>
                <button class="nav-tab" data-tab="ai-cost">
                    <span>💰</span> AI 成本
                </button>
                <button class="nav-tab" data-tab="deep-analyses">
                    <span>🔬</span> 深度分析
                </button>
                <button class="nav-tab" data-tab="forward-rules">
                    <span>⚙️</span> 转发规则
                </button>
            </div>
            <div class="nav-actions">
                <div class="nav-status">
                    <span class="status-dot"></span>
                    <span>服务运行中</span>
                </div>
                <button class="btn" onclick="toggleAutoRefresh()">
                    <span id="autoRefreshIcon">⏸️</span>
                    <span id="autoRefreshText">自动刷新</span>
                </button>
                <button class="btn" onclick="loadWebhooks()">
                    <span>🔄</span>
                    <span>刷新</span>
                </button>
                <button class="btn btn-primary" onclick="openConfigModal()">
                    <span>⚙️</span>
                    <span>配置</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 告警管理 Tab -->
        <div id="alertsTab" class="tab-content active">
            <!-- 统计卡片 -->
            <div class="stats-section">
                <div class="section-title">实时统计</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">总告警数</div>
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-trend">最后更新: <span id="lastUpdate">-</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">高优先级</div>
                        <div class="stat-value" id="highCount">0</div>
                        <div class="stat-trend">需要立即处理</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">中优先级</div>
                        <div class="stat-value" id="mediumCount">0</div>
                        <div class="stat-trend">建议尽快处理</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">重复告警</div>
                        <div class="stat-value" id="duplicateCount">0</div>
                        <div class="stat-trend">已自动去重</div>
                    </div>
                </div>
            </div>

            <!-- 筛选栏 -->
            <div class="filter-section">
                <div class="filter-grid">
                    <div class="filter-item">
                        <label class="filter-label">搜索</label>
                        <input type="search" class="filter-input" id="searchInput" name="search-field" placeholder="搜索告警内容、来源..." onkeyup="filterAlerts()" autocomplete="off" autocorrect="off" spellcheck="false">
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">优先级</label>
                        <select class="filter-input" id="importanceFilter" onchange="filterAlerts()">
                            <option value="">全部</option>
                            <option value="high">高</option>
                            <option value="medium">中</option>
                            <option value="low">低</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">来源</label>
                        <select class="filter-input" id="sourceFilter" onchange="filterAlerts()">
                            <option value="">全部</option>
                            <option value="volcengine">火山引擎</option>
                            <option value="aliyun">阿里云</option>
                            <option value="prometheus">Prometheus</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">状态</label>
                        <select class="filter-input" id="duplicateFilter" onchange="filterAlerts()">
                            <option value="">全部</option>
                            <option value="original">原始</option>
                            <option value="duplicate">重复</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 告警列表 -->
            <div class="alerts-section" id="alertList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination" style="display: none;">
                <div class="pagination-info">
                    第 <strong id="currentPageNum">1</strong> / <strong id="totalPages">1</strong> 页，共 <strong id="totalCount2">0</strong> 条
                </div>
                <div class="pagination-buttons">
                    <button id="firstPage" onclick="goToPage(1)">首页</button>
                    <button id="prevPage" onclick="goToPage('prev')">上一页</button>
                    <button id="nextPage" onclick="goToPage('next')">下一页</button>
                    <button id="lastPage" onclick="goToPage('last')">末页</button>
                </div>
                <select class="filter-input" id="pageSize" onchange="changePageSize()" style="width: auto;">
                    <option value="10">10 条/页</option>
                    <option value="20" selected>20 条/页</option>
                    <option value="50">50 条/页</option>
                </select>
            </div>
        </div>

        <!-- AI 成本 Tab -->
        <div id="aiCostTab" class="tab-content" style="display: none;">
            <div class="ai-cost-section">
                <div class="section-title">AI 成本监控</div>
                <div class="ai-period-selector" style="margin-bottom: 20px;">
                    <button class="btn" data-ai-period="day">日</button>
                    <button class="btn" data-ai-period="week">周</button>
                    <button class="btn" data-ai-period="month">月</button>
                </div>
                <div id="aiCostStats">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 深度分析 Tab -->
        <div id="deepAnalysesTab" class="tab-content" style="display: none;">
            <div class="deep-analyses-section">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div class="section-title">深度分析记录</div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <select id="daStatusFilter" class="form-input" style="width: auto; padding: 6px 12px;">
                            <option value="">全部状态</option>
                            <option value="pending">分析中</option>
                            <option value="completed">已完成</option>
                            <option value="failed">失败</option>
                        </select>
                        <select id="daEngineFilter" class="form-input" style="width: auto; padding: 6px 12px;">
                            <option value="">全部引擎</option>
                            <option value="openclaw">OpenOcta</option>
                            <option value="local">本地 AI</option>
                        </select>
                        <button class="btn" onclick="DeepAnalysesModule.load()">🔄 刷新</button>
                    </div>
                </div>
                <div id="deepAnalysesList">
                    <div style="text-align: center; padding: 40px; color: #888;">点击「深度分析」标签加载数据...</div>
                </div>
                <div id="deepAnalysesPagination" style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;"></div>
            </div>
        </div>

        <!-- 转发规则 Tab -->
        <div id="forwardRulesTab" class="tab-content" style="display: none;">
            <div class="forward-rules-section">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div class="section-title">转发规则配置</div>
                    <button class="btn btn-primary" onclick="showRuleForm()">
                        <span>➕</span> 新增规则
                    </button>
                </div>
                <div id="forwardRulesList">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- 配置模态框 -->
    <div class="modal" id="configModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">系统配置</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">转发地址</label>
                    <input type="text" class="form-input" id="configForwardUrl" placeholder="https://example.com/webhook">
                </div>
                <div class="form-group">
                    <label class="form-label">OpenAI API Key</label>
                    <input type="password" class="form-input" id="configOpenaiApiKey" placeholder="sk-...">
                </div>
                <div class="form-group">
                    <label class="form-label">API 地址</label>
                    <input type="text" class="form-input" id="configOpenaiApiUrl" placeholder="https://openrouter.ai/api/v1">
                </div>
                <div class="form-group">
                    <label class="form-label">AI 模型</label>
                    <input type="text" class="form-input" id="configOpenaiModel" placeholder="anthropic/claude-sonnet-4">
                </div>
                <div class="form-group">
                    <label class="form-label">重复告警时间窗口（小时）</label>
                    <input type="number" class="form-input" id="configDuplicateWindow" placeholder="24" min="1" max="168">
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="configEnableForward">
                    <label for="configEnableForward">启用自动转发</label>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="configEnableAi">
                    <label for="configEnableAi">启用 AI 分析</label>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="configForwardDuplicate">
                    <label for="configForwardDuplicate">转发重复告警</label>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="configEnableNoiseReduction">
                    <label for="configEnableNoiseReduction">启用智能降噪</label>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="configSuppressDerivedForward">
                    <label for="configSuppressDerivedForward">抑制衍生告警自动转发</label>
                </div>
                <div class="form-group">
                    <label class="form-label">降噪关联窗口（分钟）</label>
                    <input type="number" class="form-input" id="configNoiseWindow" placeholder="5" min="1" max="60">
                </div>
                <div class="form-group">
                    <label class="form-label">根因置信度阈值（0-1）</label>
                    <input type="number" class="form-input" id="configRootCauseConfidence" placeholder="0.65" min="0" max="1" step="0.01">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeConfigModal()">取消</button>
                <button class="btn btn-primary" onclick="saveConfig()">保存</button>
            </div>
        </div>
    </div>

    <!-- 转发模态框 -->
    <div class="modal" id="forwardModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">转发告警</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">转发地址</label>
                    <input type="text" class="form-input" id="forwardUrl" placeholder="https://example.com/webhook">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeForwardModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmForward()">确认转发</button>
            </div>
        </div>
    </div>

    <!-- 转发规则模态框 -->
    <div class="modal" id="ruleFormModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2 class="modal-title" id="ruleFormTitle">新增转发规则</h2>
            </div>
            <div class="modal-body">
                <input type="hidden" id="ruleFormId">
                <div class="form-group">
                    <label class="form-label">规则名称 *</label>
                    <input type="text" class="form-input" id="ruleFormName" placeholder="例如：高优转飞书运维群">
                </div>
                <div class="form-group">
                    <label class="form-label">优先级</label>
                    <input type="number" class="form-input" id="ruleFormPriority" placeholder="10" value="10" min="0" max="100">
                    <small style="color: var(--text-secondary); font-size: 12px;">数字越大优先级越高，先匹配</small>
                </div>
                <div class="form-group">
                    <label class="form-label">匹配条件 - 重要性</label>
                    <div style="display: flex; gap: 15px;">
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                            <input type="checkbox" id="ruleFormImportanceHigh" value="high"> 高
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                            <input type="checkbox" id="ruleFormImportanceMedium" value="medium"> 中
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                            <input type="checkbox" id="ruleFormImportanceLow" value="low"> 低
                        </label>
                    </div>
                    <small style="color: var(--text-secondary); font-size: 12px;">不选=匹配全部</small>
                </div>
                <div class="form-group">
                    <label class="form-label">匹配条件 - 告警状态</label>
                    <select class="form-input" id="ruleFormDuplicate">
                        <option value="all">全部</option>
                        <option value="new">新告警</option>
                        <option value="duplicate">窗口内重复</option>
                        <option value="beyond_window">窗口外重复</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">匹配条件 - 来源</label>
                    <input type="text" class="form-input" id="ruleFormSource" placeholder="逗号分隔多个来源，空=全部">
                    <small style="color: var(--text-secondary); font-size: 12px;">例如：prometheus,alertmanager</small>
                </div>
                <div class="form-group">
                    <label class="form-label">目标类型 *</label>
                    <select class="form-input" id="ruleFormTargetType" onchange="onTargetTypeChange()">
                        <option value="feishu">飞书</option>
                        <option value="openclaw">OpenOcta</option>
                        <option value="webhook">Webhook</option>
                    </select>
                </div>
                <div class="form-group" id="ruleFormTargetUrlGroup">
                    <label class="form-label">目标地址 *</label>
                    <input type="text" class="form-input" id="ruleFormTargetUrl" placeholder="https://open.feishu.cn/...">
                </div>
                <div class="form-group">
                    <label class="form-label">目标名称</label>
                    <input type="text" class="form-input" id="ruleFormTargetName" placeholder="例如：运维飞书群">
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="ruleFormStopOnMatch">
                    <label for="ruleFormStopOnMatch">匹配后停止继续匹配其他规则</label>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="ruleFormEnabled" checked>
                    <label for="ruleFormEnabled">启用规则</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeRuleForm()">取消</button>
                <button class="btn btn-primary" onclick="saveRule()">保存</button>
            </div>
        </div>
    </div>

    <!-- 外部脚本（按依赖顺序加载） -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/alerts.js"></script>
    <script src="/static/js/ai-cost.js"></script>
    <script src="/static/js/forward-rules.js"></script>
    <script src="/static/js/deep-analyses.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
