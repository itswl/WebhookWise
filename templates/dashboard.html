<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook 监控中心</title>
    
    <!-- 外部样式表 -->
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">
                <span>🔔</span>
                <span>Webhook Monitor</span>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="alerts">
                    <span>🔔</span> 告警管理
                </button>
                <button class="nav-tab" data-tab="skills">
                    <span>🔗</span> 平台连接
                </button>
                <button class="nav-tab" data-tab="ai-cost">
                    <span>💰</span> AI 成本
                </button>
                <button class="nav-tab" data-tab="predictions">
                    <span>🔮</span> 预测分析
                </button>
                <button class="nav-tab" data-tab="remediation">
                    <span>🔧</span> 自动修复
                </button>
                <button class="nav-tab" data-tab="topology">
                    <span>🕸️</span> 服务拓扑
                </button>
            </div>
            <div class="nav-actions">
                <div class="nav-status">
                    <span class="status-dot"></span>
                    <span>服务运行中</span>
                </div>
                <button class="btn" onclick="toggleAutoRefresh()">
                    <span id="autoRefreshIcon">⏸️</span>
                    <span id="autoRefreshText">自动刷新</span>
                </button>
                <button class="btn" onclick="loadWebhooks()">
                    <span>🔄</span>
                    <span>刷新</span>
                </button>
                <button class="btn btn-primary" onclick="openConfigModal()">
                    <span>⚙️</span>
                    <span>配置</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 告警管理 Tab -->
        <div id="alertsTab" class="tab-content active">
            <!-- 统计卡片 -->
            <div class="stats-section">
                <div class="section-title">实时统计</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">总告警数</div>
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-trend">最后更新: <span id="lastUpdate">-</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">高优先级</div>
                        <div class="stat-value" id="highCount">0</div>
                        <div class="stat-trend">需要立即处理</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">中优先级</div>
                        <div class="stat-value" id="mediumCount">0</div>
                        <div class="stat-trend">建议尽快处理</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">重复告警</div>
                        <div class="stat-value" id="duplicateCount">0</div>
                        <div class="stat-trend">已自动去重</div>
                    </div>
                </div>
            </div>

            <!-- 筛选栏 -->
            <div class="filter-section">
                <div class="filter-grid">
                    <div class="filter-item">
                        <label class="filter-label">搜索</label>
                        <input type="search" class="filter-input" id="searchInput" name="search-field" placeholder="搜索告警内容、来源..." onkeyup="filterAlerts()" autocomplete="off" autocorrect="off" spellcheck="false">
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">优先级</label>
                        <select class="filter-input" id="importanceFilter" onchange="filterAlerts()">
                            <option value="">全部</option>
                            <option value="high">高</option>
                            <option value="medium">中</option>
                            <option value="low">低</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">来源</label>
                        <select class="filter-input" id="sourceFilter" onchange="filterAlerts()">
                            <option value="">全部</option>
                            <option value="volcengine">火山引擎</option>
                            <option value="aliyun">阿里云</option>
                            <option value="prometheus">Prometheus</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label class="filter-label">状态</label>
                        <select class="filter-input" id="duplicateFilter" onchange="filterAlerts()">
                            <option value="">全部</option>
                            <option value="original">原始</option>
                            <option value="duplicate">重复</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 告警列表 -->
            <div class="alerts-section" id="alertList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination" style="display: none;">
                <div class="pagination-info">
                    第 <strong id="currentPageNum">1</strong> / <strong id="totalPages">1</strong> 页，共 <strong id="totalCount2">0</strong> 条
                </div>
                <div class="pagination-buttons">
                    <button id="firstPage" onclick="goToPage(1)">首页</button>
                    <button id="prevPage" onclick="goToPage('prev')">上一页</button>
                    <button id="nextPage" onclick="goToPage('next')">下一页</button>
                    <button id="lastPage" onclick="goToPage('last')">末页</button>
                </div>
                <select class="filter-input" id="pageSize" onchange="changePageSize()" style="width: auto;">
                    <option value="10">10 条/页</option>
                    <option value="20" selected>20 条/页</option>
                    <option value="50">50 条/页</option>
                </select>
            </div>
        </div>

        <!-- 平台连接 Tab -->
        <div id="skillsTab" class="tab-content" style="display: none;">
            <div class="skills-section">
                <div class="section-title">平台连接</div>
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openSkillConfigModal()">
                        <span>+</span> 添加连接
                    </button>
                </div>
                <div class="skills-grid" id="skillsGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>

            <!-- 外部 Skill 管理 -->
            <div class="external-skills-section" style="margin-top: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3 style="margin: 0; font-size: 16px; font-weight: 600; color: #24292e;">外部 Skill</h3>
                    <button class="btn btn-sm" onclick="reloadExternalSkills()">🔄 刷新发现</button>
                </div>
                <div id="external-skills-list" class="skills-grid">
                    <p class="text-muted">加载中...</p>
                </div>
            </div>
        </div>

        <!-- AI 成本 Tab -->
        <div id="aiCostTab" class="tab-content" style="display: none;">
            <div class="ai-cost-section">
                <div class="section-title">AI 成本监控</div>
                <div class="ai-period-selector" style="margin-bottom: 20px;">
                    <button class="btn" data-ai-period="day">日</button>
                    <button class="btn" data-ai-period="week">周</button>
                    <button class="btn" data-ai-period="month">月</button>
                </div>
                <div id="aiCostStats">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 预测分析 Tab -->
        <div id="predictionsTab" class="tab-content" style="display: none;">
            <div class="predictions-section">
                <div class="section-title">预测分析</div>
                <div class="predictions-actions" style="margin-bottom: 20px;">
                    <button class="btn btn-primary" id="runPredictionBtn">
                        <span>▶️</span> 运行预测
                    </button>
                    <button class="btn" id="analyzePatternsBtn">
                        <span>📊</span> 分析模式
                    </button>
                </div>
                <div class="predictions-container">
                    <div class="predictions-header"><h3>告警预测</h3></div>
                    <div id="predictionsList">
                        <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
                    </div>
                </div>
                <div class="patterns-container" style="margin-top: 30px;">
                    <div class="patterns-header"><h3>告警模式</h3></div>
                    <div id="patternsList">
                        <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 自动修复 Tab -->
        <div id="remediationTab" class="tab-content" style="display: none;">
            <div class="remediation-section">
                <div class="section-title">自动修复</div>
                <div class="runbooks-container">
                    <div class="container-header"><h3>修复脚本 (Runbooks)</h3></div>
                    <div id="runbooksList">
                        <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
                    </div>
                </div>
                <div class="remediation-history-container" style="margin-top: 30px;">
                    <div class="container-header"><h3>执行历史</h3></div>
                    <div id="remediationHistory">
                        <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 服务拓扑 Tab -->
        <div id="topologyTab" class="tab-content" style="display: none;">
            <div class="topology-section">
                <div class="section-title">服务拓扑</div>
                <div class="topology-actions" style="margin-bottom: 20px;">
                    <button class="btn btn-primary" id="addDependencyBtn">
                        <span>➕</span> 添加依赖
                    </button>
                    <button class="btn" id="addServiceNodeBtn">
                        <span>🆕</span> 添加服务
                    </button>
                    <button class="btn" id="discoverTopologyBtn">
                        <span>🔍</span> 自动发现
                    </button>
                </div>
                <div id="topologyGraph" class="topology-graph-container">
                    <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 配置模态框 -->
    <div class="modal" id="configModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">系统配置</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">转发地址</label>
                    <input type="text" class="form-input" id="configForwardUrl" placeholder="https://example.com/webhook">
                </div>
                <div class="form-group">
                    <label class="form-label">OpenAI API Key</label>
                    <input type="password" class="form-input" id="configOpenaiApiKey" placeholder="sk-...">
                </div>
                <div class="form-group">
                    <label class="form-label">API 地址</label>
                    <input type="text" class="form-input" id="configOpenaiApiUrl" placeholder="https://openrouter.ai/api/v1">
                </div>
                <div class="form-group">
                    <label class="form-label">AI 模型</label>
                    <input type="text" class="form-input" id="configOpenaiModel" placeholder="anthropic/claude-sonnet-4">
                </div>
                <div class="form-group">
                    <label class="form-label">重复告警时间窗口（小时）</label>
                    <input type="number" class="form-input" id="configDuplicateWindow" placeholder="24" min="1" max="168">
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="configEnableForward">
                    <label for="configEnableForward">启用自动转发</label>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="configEnableAi">
                    <label for="configEnableAi">启用 AI 分析</label>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="configForwardDuplicate">
                    <label for="configForwardDuplicate">转发重复告警</label>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="configEnableNoiseReduction">
                    <label for="configEnableNoiseReduction">启用智能降噪</label>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="configSuppressDerivedForward">
                    <label for="configSuppressDerivedForward">抑制衍生告警自动转发</label>
                </div>
                <div class="form-group">
                    <label class="form-label">降噪关联窗口（分钟）</label>
                    <input type="number" class="form-input" id="configNoiseWindow" placeholder="5" min="1" max="60">
                </div>
                <div class="form-group">
                    <label class="form-label">根因置信度阈值（0-1）</label>
                    <input type="number" class="form-input" id="configRootCauseConfidence" placeholder="0.65" min="0" max="1" step="0.01">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeConfigModal()">取消</button>
                <button class="btn btn-primary" onclick="saveConfig()">保存</button>
            </div>
        </div>
    </div>

    <!-- 转发模态框 -->
    <div class="modal" id="forwardModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">转发告警</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">转发地址</label>
                    <input type="text" class="form-input" id="forwardUrl" placeholder="https://example.com/webhook">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeForwardModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmForward()">确认转发</button>
            </div>
        </div>
    </div>

    <!-- Skill 配置模态框 -->
    <div class="modal" id="skillConfigModal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h2 class="modal-title" id="skillConfigModalTitle">添加连接</h2>
            </div>
            <div class="modal-body">
                <input type="hidden" id="skillConfigId">
                <div class="form-group">
                    <label class="form-label">名称 <span style="color: #d73a49;">*</span></label>
                    <input type="text" class="form-input" id="skillConfigName" placeholder="my-custom-skill">
                    <small style="color: #586069; font-size: 0.75rem;">使用小写字母、数字和连字符</small>
                </div>
                <div class="form-group">
                    <label class="form-label">显示名称 <span style="color: #d73a49;">*</span></label>
                    <input type="text" class="form-input" id="skillConfigDisplayName" placeholder="我的自定义连接">
                </div>
                <div class="form-group">
                    <label class="form-label">类型 <span style="color: #d73a49;">*</span></label>
                    <select class="form-input" id="skillConfigType" onchange="onSkillTypeChange()">
                        <option value="">请选择...</option>
                        <option value="kubernetes">Kubernetes</option>
                        <option value="prometheus">Prometheus</option>
                        <option value="grafana">Grafana</option>
                        <option value="log">日志平台</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-input" id="skillConfigDescription" rows="2" placeholder="连接器描述..."></textarea>
                </div>

                <!-- Kubernetes 配置区域 -->
                <div class="skill-config-section" data-type="kubernetes" style="display: none;">
                    <div class="form-group">
                        <label class="form-label">Kubeconfig 路径</label>
                        <input type="text" class="form-input" data-config-key="kubeconfig" placeholder="~/.kube/config">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Context</label>
                        <input type="text" class="form-input" data-config-key="context" placeholder="default">
                    </div>
                    <div class="form-group">
                        <label class="form-label">超时时间（秒）</label>
                        <input type="number" class="form-input" data-config-key="timeout" value="30">
                    </div>
                </div>

                <!-- Prometheus 配置区域 -->
                <div class="skill-config-section" data-type="prometheus" style="display: none;">
                    <div class="form-group">
                        <label class="form-label">Prometheus URL <span style="color: #d73a49;">*</span></label>
                        <input type="text" class="form-input" data-config-key="url" placeholder="http://localhost:9090">
                    </div>
                    <div class="form-group">
                        <label class="form-label">认证 Token</label>
                        <input type="password" class="form-input" data-config-key="auth_token" placeholder="Bearer token">
                    </div>
                    <div class="form-group">
                        <label class="form-label">超时时间（秒）</label>
                        <input type="number" class="form-input" data-config-key="timeout" value="15">
                    </div>
                </div>

                <!-- Grafana 配置区域 -->
                <div class="skill-config-section" data-type="grafana" style="display: none;">
                    <div class="form-group">
                        <label class="form-label">Grafana URL <span style="color: #d73a49;">*</span></label>
                        <input type="text" class="form-input" data-config-key="url" placeholder="http://localhost:3000">
                    </div>
                    <div class="form-group">
                        <label class="form-label">API Token</label>
                        <input type="password" class="form-input" data-config-key="api_token" placeholder="Bearer token or API key">
                    </div>
                    <div class="form-group">
                        <label class="form-label">超时时间（秒）</label>
                        <input type="number" class="form-input" data-config-key="timeout" value="15">
                    </div>
                </div>

                <!-- Log 配置区域 -->
                <div class="skill-config-section" data-type="log" style="display: none;">
                    <div class="form-group">
                        <label class="form-label">后端类型</label>
                        <select class="form-input" data-config-key="backend">
                            <option value="elasticsearch">Elasticsearch</option>
                            <option value="loki">Loki</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">URL <span style="color: #d73a49;">*</span></label>
                        <input type="text" class="form-input" data-config-key="url" placeholder="http://localhost:9200">
                    </div>
                    <div class="form-group">
                        <label class="form-label">索引模式</label>
                        <input type="text" class="form-input" data-config-key="index" placeholder="logstash-*">
                    </div>
                    <div class="form-group">
                        <label class="form-label">认证用户名</label>
                        <input type="text" class="form-input" data-config-key="auth_user" placeholder="elastic">
                    </div>
                    <div class="form-group">
                        <label class="form-label">认证密码</label>
                        <input type="password" class="form-input" data-config-key="auth_pass" placeholder="password">
                    </div>
                </div>

                <!-- 自定义 Skill 配置区域 -->
                <div class="skill-config-section" data-type="custom" style="display: none;">
                    <div class="form-group">
                        <label class="form-label">配置 (JSON)</label>
                        <textarea class="form-input" data-config-key="config_json" rows="4" placeholder='{"url": "...", "token": "..."}'></textarea>
                    </div>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="skillConfigEnabled" checked>
                    <label for="skillConfigEnabled">启用此连接</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeSkillConfigModal()">取消</button>
                <button class="btn btn-primary" onclick="saveSkillConfig()">保存</button>
            </div>
        </div>
    </div>

    <!-- Skill 代码编辑器模态框 -->
    <div class="modal" id="skillCodeEditorModal">
        <div class="modal-content" style="max-width: 900px; width: 90%;">
            <div class="modal-header">
                <h2 class="modal-title" id="skillCodeEditorTitle">编辑 Skill 代码</h2>
            </div>
            <div class="modal-body">
                <input type="hidden" id="skillCodeEditorId">
                <div style="margin-bottom: 15px;">
                    <button class="btn btn-sm" onclick="loadSkillTemplate()">加载模板</button>
                    <button class="btn btn-sm" onclick="formatSkillCode()">格式化</button>
                    <button class="btn btn-sm" onclick="validateSkillCode()">验证</button>
                </div>
                <div class="form-group">
                    <textarea class="form-input" id="skillCodeEditorContent" rows="25" style="font-family: 'Monaco', 'Menlo', 'Consolas', monospace; font-size: 13px; line-height: 1.5; background: #1e1e1e; color: #d4d4d4;"></textarea>
                </div>
                <div id="skillCodeValidationResult" style="margin-top: 10px; padding: 10px; border-radius: 6px; display: none;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeSkillCodeEditor()">取消</button>
                <button class="btn btn-secondary" onclick="testSkillCode()">测试执行</button>
                <button class="btn btn-primary" onclick="saveSkillCode()">保存</button>
            </div>
        </div>
    </div>

    <!-- 外部脚本（按依赖顺序加载） -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/alerts.js"></script>
    <script src="/static/js/skills.js"></script>
    <script src="/static/js/ai-cost.js"></script>
    <script src="/static/js/predictions.js"></script>
    <script src="/static/js/remediation.js"></script>
    <script src="/static/js/topology.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
