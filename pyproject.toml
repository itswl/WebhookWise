[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["I", "B", "UP", "SIM", "F", "C4", "PIE", "PERF", "E", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"api/*.py" = ["B008"]
"main.py" = ["E402"]
"worker.py" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
