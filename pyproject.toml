[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["I", "B", "UP", "SIM", "F", "C4", "PIE", "PERF", "E", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"api/*.py" = ["B008"]
"main.py" = ["E402"]
"worker.py" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = "-p no:cacheprovider"
markers = [
  "real_httpx: allow a test to use the real httpx client instead of the default mock",
  "real_network: allow a test to use real outbound HTTP libraries",
  "real_redis: allow a test to use a real Redis client instead of the default mock",
  "real_requests: allow a test to use real requests calls instead of the default mock",
  "real_services: allow a test to opt out of default external-service mocks",
]

[tool.coverage.run]
source = ["core", "api", "services", "models", "adapters", "db"]
omit = ["tests/*", "alembic/*", "scripts/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 63

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["sqlalchemy.ext.mypy.plugin"]
files = ["."]
exclude = [
  "^docs/",
  "^tests/",
  "^scripts/",
  "^templates/",
  "^alembic/",
  "^postgres_data/",
  "^webhooks_data/",
  "^\\.venv/",
  "^\\.tox/",
]

[[tool.mypy.overrides]]
module = [
  "opentelemetry.*",
  "pyroscope.*",
  "asyncpg.*",
  "instructor",
  "uvloop",
  "gunicorn.*",
]
ignore_missing_imports = true
