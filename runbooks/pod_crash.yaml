name: pod_crash_restart
description: "Pod CrashLoopBackOff 时自动重启并收集诊断信息"
version: "1.0"

trigger:
  alert_type: "pod_crash"
  severity:
    - critical
  conditions:
    - metric: "restart_count"
      operator: ">"
      value: 3

safety:
  require_approval: false
  dry_run: false
  max_retries: 1
  rollback_on_failure: true
  timeout: 300

steps:
  - action: "kubectl_logs"
    params:
      pod: "{{ alert.labels.pod }}"
      namespace: "{{ alert.labels.namespace | default('default') }}"
      tail: 100
      save_to: "diagnostics"
    on_failure: "continue"
  
  - action: "kubectl_restart"
    params:
      deployment: "{{ alert.labels.deployment }}"
      namespace: "{{ alert.labels.namespace | default('default') }}"
    on_failure: "abort"
  
  - action: "wait"
    duration: 90
  
  - action: "verify_alert_resolved"
    timeout: 180
    on_failure: "continue"
  
  - action: "notify"
    params:
      message: "Pod 重启完成：{{ alert.labels.pod }}，诊断日志已保存"
      include_diagnostics: true
