name: disk_full_cleanup
description: "磁盘空间不足时自动清理临时文件和旧日志"
version: "1.0"

trigger:
  alert_type: "disk_full"
  severity:
    - critical
    - warning
  conditions:
    - metric: "disk_usage"
      operator: ">"
      value: 85

safety:
  require_approval: true
  dry_run: false
  max_retries: 1
  rollback_on_failure: false
  timeout: 300

steps:
  - action: "script"
    params:
      command: "find /tmp -type f -mtime +7 -delete"
      target_host: "{{ alert.labels.instance }}"
    on_failure: "continue"
  
  - action: "script"
    params:
      command: "journalctl --vacuum-time=3d"
      target_host: "{{ alert.labels.instance }}"
    on_failure: "continue"
  
  - action: "wait"
    duration: 30
  
  - action: "verify_alert_resolved"
    timeout: 120
    on_failure: "abort"
  
  - action: "notify"
    params:
      message: "磁盘清理完成：{{ alert.labels.instance }}"
