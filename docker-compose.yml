networks:
  webhook_net:

services:
  webhook-service:
    build: .
    container_name: webhook-receiver
    restart: unless-stopped

    # TCP 调优：提升高并发连接处理能力
    sysctls:
      # 监听队列上限，默认 128 不足以应对突发流量
      net.core.somaxconn: 4096
      # 允许 TIME_WAIT 状态的 socket 被重新使用，加快端口回收
      net.ipv4.tcp_tw_reuse: 1
      # 扩大本地端口范围，支撑更多出站连接（转发 / OpenClaw / 飞书）
      net.ipv4.ip_local_port_range: "1024 65535"
      # SYN 半连接队列上限，防止 SYN Flood 时丢包
      net.ipv4.tcp_max_syn_backlog: 8192

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    ports:
      - "8000:8000"   # 只暴露业务服务

    env_file:
      - .env

    environment:
      RUN_MODE: api
      PORT: ${PORT:-8000}
      FLASK_ENV: ${FLASK_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      API_KEY: ${API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://webhook_user:postgres@postgres:5432/webhooks}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      MAX_CONCURRENT_WEBHOOK_TASKS: ${MAX_CONCURRENT_WEBHOOK_TASKS:-30}

    volumes:
      - ./.env:/app/.env # 挂载 .env 文件
      - ./logs:/app/logs
      - ./webhooks_data:/app/webhooks_data

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - webhook_net

  worker:
    build: .
    container_name: webhook-worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    env_file:
      - .env
    environment:
      RUN_MODE: worker
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://webhook_user:postgres@postgres:5432/webhooks}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      MAX_CONCURRENT_WEBHOOK_TASKS: ${MAX_CONCURRENT_WEBHOOK_TASKS:-30}
    volumes:
      - ./.env:/app/.env
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - webhook_net

  redis:
    image: redis:7-alpine
    container_name: webhook-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webhook_net

  postgres:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/postgres:15-alpine
    container_name: webhook-postgres
    restart: unless-stopped

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    # ⚠️ 不暴露 ports，宿主机无法访问
    # ports: []

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webhooks}
      POSTGRES_USER: ${POSTGRES_USER:-webhook_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

    volumes:
      - ./postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webhook_user} -d ${POSTGRES_DB:-webhooks}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - webhook_net
