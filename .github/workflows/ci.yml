name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docker_e2e: ${{ steps.filter.outputs.docker_e2e }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker_e2e:
              - ".github/workflows/ci.yml"
              - "Dockerfile"
              - "deploy/compose/**"
              - "entrypoint.sh"
              - "alembic/**"
              - "scripts/run_migrations.py"
              - "models/**"
              - "db/**"
              - "core/config/**"
              - "core/redis_client.py"
              - "core/retry_policies.py"
              - "core/taskiq_broker.py"
              - "contracts/**"
              - "api/v1/forwarding.py"
              - "api/v1/webhook.py"
              - "schemas/forwarding.py"
              - "schemas/webhook.py"
              - "services/forwarding/**"
              - "services/operations/**"
              - "services/webhooks/**"
              - "tests/e2e/**"
              - "requirements*.txt"
              - "requirements*.lock"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"
      # Persist mypy's incremental cache across runs, keyed on the Python version
      # plus the dependency locks and mypy config so it invalidates when they change.
      - uses: actions/cache@v6
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-py3.12-${{ hashFiles('requirements.lock', 'requirements-dev.lock', 'pyproject.toml') }}
          restore-keys: |
            mypy-${{ runner.os }}-py3.12-
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.lock -r requirements-dev.lock
      - run: python -m compileall -q .
      - run: ruff check .
      - run: ruff format --check .
      # shellcheck ships pre-installed on GitHub-hosted ubuntu runners.
      - run: shellcheck entrypoint.sh tests/e2e/run_webhook_to_feishu.sh
      - run: python scripts/check_requirements_locks.py
      - run: mypy
      - run: bandit -r core api services models adapters db scripts contracts -x tests -q -s B106
      - run: pip-audit -r requirements.lock -r requirements-dev.lock
      - run: python scripts/observability/webhookwise_observe.py contract
      # -n auto parallelizes across runner cores; pytest-cov combines per-worker
      # coverage before evaluating --cov-fail-under.
      # --dist loadfile keeps each test file's tests on one worker in collection
      # order. Some analysis/forwarding tests carry module-scoped state that the
      # suite handles in-order (a single-process run is green) but the default
      # `load` scheduler can interleave across workers into a leaking order.
      # loadfile pins that boundary; the residual isolation debt is tracked
      # separately.
      - run: pytest -n auto --dist loadfile -q --cov=core --cov=api --cov=services --cov=models --cov=adapters --cov=db --cov=contracts --cov-branch --cov-report=term --cov-report=xml --cov-fail-under=85

  docker-e2e:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || needs.changes.outputs.docker_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      # Build the app image once with a persistent GHA layer cache and load it
      # into the local daemon under the exact tag the compose file references, so
      # the e2e run reuses it (E2E_SKIP_BUILD=1) instead of rebuilding from scratch.
      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: webhookwise-e2e:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: E2E_SKIP_BUILD=1 tests/e2e/run_webhook_to_feishu.sh
