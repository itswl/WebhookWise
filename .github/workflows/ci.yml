name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docker_e2e: ${{ steps.filter.outputs.docker_e2e }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker_e2e:
              - ".github/workflows/ci.yml"
              - "Dockerfile"
              - "deploy/compose/**"
              - "entrypoint.sh"
              - "alembic/**"
              - "scripts/run_migrations.py"
              - "models/**"
              - "db/**"
              - "core/config/**"
              - "core/redis_client.py"
              - "core/retry_policies.py"
              - "core/taskiq_broker.py"
              - "contracts/**"
              - "api/v1/forwarding.py"
              - "api/v1/webhook.py"
              - "schemas/forwarding.py"
              - "schemas/webhook.py"
              - "services/forwarding/**"
              - "services/operations/**"
              - "services/webhooks/**"
              - "tests/e2e/**"
              - "requirements*.txt"
              - "requirements*.lock"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.lock -r requirements-dev.lock
      - run: python -m compileall -q .
      - run: ruff check .
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck entrypoint.sh tests/e2e/run_webhook_to_feishu.sh
      - run: python scripts/check_requirements_locks.py
      - run: mypy
      - run: bandit -r core api services models adapters db scripts contracts -x tests -q -s B106
      - run: pip-audit -r requirements.lock -r requirements-dev.lock
      - run: python scripts/observability/webhookwise_observe.py contract
      - run: pytest -q --cov=core --cov=api --cov=services --cov=models --cov=adapters --cov=db --cov=contracts --cov-report=term --cov-report=xml --cov-fail-under=90

  docker-e2e:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || needs.changes.outputs.docker_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: tests/e2e/run_webhook_to_feishu.sh
