name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver release version, with or without a leading v"
        required: true
        type: string
      publish:
        description: "Push the built images to GHCR and Docker Hub"
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/itswl/webhookwise
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
  IMAGE_PLATFORMS: linux/amd64,linux/arm64

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.publish.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v7

      - id: version
        shell: bash
        env:
          RELEASE_INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_version="${RELEASE_INPUT_VERSION}"
          fi
          version="${release_version#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must be semver X.Y.Z, got: $release_version" >&2
            exit 1
          fi
          declared="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )"
          if [[ "$declared" != "$version" ]]; then
            echo "pyproject.toml version $declared does not match release $version" >&2
            exit 1
          fi
          grep -Eq "^## \\[$version\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - id: publish
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish }}" != "true" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  ci-gate:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Require successful ci workflow for release commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          SHOULD_PUBLISH: ${{ needs.verify.outputs.should_publish }}
        run: |
          set -euo pipefail
          if [[ "$SHOULD_PUBLISH" != "true" ]]; then
            echo "Release publishing disabled; skipping CI gate."
            exit 0
          fi

          deadline=$((SECONDS + 1200))
          while true; do
            runs_json="$(
              gh run list \
                --workflow ci.yml \
                --branch main \
                --commit "$RELEASE_SHA" \
                --json conclusion,status,url \
                --limit 10
            )"

            success_url="$(jq -r '[.[] | select(.status == "completed" and .conclusion == "success")] | .[0].url // ""' <<< "$runs_json")"
            if [[ -n "$success_url" ]]; then
              echo "CI succeeded for $RELEASE_SHA: $success_url"
              exit 0
            fi

            active_count="$(jq -r '[.[] | select(.status != "completed")] | length' <<< "$runs_json")"
            failed_summary="$(jq -r '[.[] | select(.status == "completed" and .conclusion != "success")] | .[0] | if . == null then "" else "\(.conclusion): \(.url)" end' <<< "$runs_json")"
            if [[ -n "$failed_summary" && "$active_count" == "0" ]]; then
              echo "CI did not pass for $RELEASE_SHA: $failed_summary" >&2
              exit 1
            fi

            if (( SECONDS >= deadline )); then
              echo "Timed out waiting for ci.yml to pass for $RELEASE_SHA" >&2
              jq -r '.[] | "- \(.status)/\(.conclusion // "none") \(.url)"' <<< "$runs_json" >&2
              exit 1
            fi

            echo "Waiting for ci.yml to pass for $RELEASE_SHA..."
            sleep 30
          done

  image:
    needs:
      - verify
      - ci-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Prepare image names
        id: image_names
        shell: bash
        env:
          GHCR_IMAGE: ${{ env.GHCR_IMAGE }}
          DOCKERHUB_IMAGE: ${{ env.DOCKERHUB_IMAGE }}
          SHOULD_PUBLISH: ${{ needs.verify.outputs.should_publish }}
        run: |
          set -euo pipefail
          images="$GHCR_IMAGE"
          if [[ -n "$DOCKERHUB_IMAGE" ]]; then
            dockerhub_image="${DOCKERHUB_IMAGE#docker.io/}"
            images="${images}"$'\n'"docker.io/${dockerhub_image}"
          elif [[ "$SHOULD_PUBLISH" == "true" ]]; then
            echo "Repository variable DOCKERHUB_IMAGE is required, e.g. imwl/webhookwise" >&2
            exit 1
          fi
          {
            echo "images<<EOF"
            printf '%s\n' "$images"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate Docker Hub credentials
        if: needs.verify.outputs.should_publish == 'true'
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$DOCKERHUB_USERNAME" ]]; then
            echo "Secret DOCKERHUB_USERNAME is required for release publishing" >&2
            exit 1
          fi
          if [[ -z "$DOCKERHUB_TOKEN" ]]; then
            echo "Secret DOCKERHUB_TOKEN is required for release publishing" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        if: needs.verify.outputs.should_publish == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        if: needs.verify.outputs.should_publish == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ steps.image_names.outputs.images }}
          tags: |
            type=raw,value=${{ needs.verify.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.version=${{ needs.verify.outputs.version }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: ${{ needs.verify.outputs.should_publish == 'true' }}
          build-args: |
            APP_VERSION=${{ needs.verify.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
