name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver release version, with or without a leading v"
        required: true
        type: string
      publish:
        description: "Push the built image to GHCR"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.publish.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must be semver X.Y.Z, got: $RELEASE_VERSION" >&2
            exit 1
          fi
          declared="$(python - <<'PY'
import tomllib
with open("pyproject.toml", "rb") as fh:
    print(tomllib.load(fh)["project"]["version"])
PY
)"
          if [[ "$declared" != "$version" ]]; then
            echo "pyproject.toml version $declared does not match release $version" >&2
            exit 1
          fi
          grep -Eq "^## \\[$version\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - id: publish
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish }}" != "true" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  image:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: needs.verify.outputs.should_publish == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.verify.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.version=${{ needs.verify.outputs.version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ needs.verify.outputs.should_publish == 'true' }}
          build-args: |
            APP_VERSION=${{ needs.verify.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
