[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
childlogdir=/tmp

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[program:api]
command=/bin/sh -c 'RUN_MODE=api OTEL_SERVICE_NAME="${OTEL_API_SERVICE_NAME:-webhookwise-api}" exec /app/scripts/run_api.sh'
directory=/app
priority=10
autostart=true
autorestart=true
startsecs=5
stopsignal=TERM
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0

[program:worker]
command=/bin/sh -c 'RUN_MODE=worker OTEL_SERVICE_NAME="${OTEL_WORKER_SERVICE_NAME:-webhookwise-worker}" exec taskiq worker --log-level "${THIRD_PARTY_LOG_LEVEL:-WARNING}" core.taskiq_broker:broker services.operations.tasks'
directory=/app
priority=20
autostart=true
autorestart=true
startsecs=5
stopsignal=TERM
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0

[program:scheduler]
command=/bin/sh -c 'RUN_MODE=scheduler OTEL_SERVICE_NAME="${OTEL_SCHEDULER_SERVICE_NAME:-webhookwise-scheduler}" exec taskiq scheduler --log-level "${THIRD_PARTY_LOG_LEVEL:-WARNING}" core.taskiq_broker:scheduler --update-interval 5 --loop-interval 1'
directory=/app
priority=30
autostart=true
autorestart=true
startsecs=5
stopsignal=TERM
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
