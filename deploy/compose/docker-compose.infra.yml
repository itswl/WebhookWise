# Local infrastructure: PostgreSQL + Redis
# Usage:
#   Daily business stack: docker compose up -d
#   Start infrastructure only: docker compose -p webhookwise --env-file .env -f deploy/compose/docker-compose.infra.yml up -d
#   When using cloud services: do not start this file; set DATABASE_URL and REDIS_URL in .env to point at the cloud instances

networks:
  webhook_net:

services:
  postgres:
    image: postgres:15-alpine
    container_name: webhook-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webhooks}
      POSTGRES_USER: ${POSTGRES_USER:-webhook_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - webhookwise_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webhook_user} -d ${POSTGRES_DB:-webhooks}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webhook_net

  redis:
    image: redis:7-alpine
    container_name: webhook-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - webhookwise_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webhook_net

volumes:
  webhookwise_postgres_data:
    name: webhookwise_postgres_data
  webhookwise_redis_data:
    name: webhookwise_redis_data
