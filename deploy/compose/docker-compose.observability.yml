# Optional local observability stack. Start the business stack first with:
#   docker compose up -d
#
# Then start observability in a separate Compose project:
#   docker compose -p webhookwise-observability --env-file .env -f deploy/compose/docker-compose.observability.yml up -d
#   docker compose -p webhookwise-observability --env-file .env -f deploy/compose/docker-compose.observability.yml --profile load run --rm k6

name: webhookwise-observability

services:
  alloy:
    image: ${ALLOY_IMAGE:-grafana/alloy:v1.16.1}
    user: "0:0"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ../../deploy/observability/alloy.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
      - "${FARO_RECEIVER_PORT:-12347}:12347"
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - webhook_net

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.11.3}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --enable-feature=native-histograms,exemplar-storage
    volumes:
      - ../../deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../deploy/observability/alerts.yml:/etc/prometheus/rules/webhookwise-alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - webhook_net

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-prom/alertmanager:v0.32.1}
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ../../deploy/observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - webhook_net

  beyla:
    image: ${BEYLA_IMAGE:-grafana/beyla:3.15.0}
    command: ["-config", "/etc/beyla/config.yml"]
    pid: "container:webhook-receiver"
    privileged: true
    environment:
      BEYLA_CONFIG_PATH: /etc/beyla/config.yml
    volumes:
      - ../../deploy/observability/beyla.yml:/etc/beyla/config.yml:ro
    depends_on:
      alloy:
        condition: service_started
    networks:
      - webhook_net

  k6:
    image: ${K6_IMAGE:-grafana/k6:2.0.0}
    profiles:
      - load
    environment:
      BASE_URL: ${K6_BASE_URL:-http://webhook-service:8000}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-please-change-webhook-secret}
      K6_RUN_ID: ${K6_RUN_ID:-}
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_STATS: p(95),p(99),avg,min,max
      K6_PROMETHEUS_RW_STALE_MARKERS: "true"
    volumes:
      - ../../tests/k6:/scripts:ro
    command: ["run", "-o", "experimental-prometheus-rw", "/scripts/webhook_smoke.js"]
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - webhook_net

  pyroscope:
    image: ${PYROSCOPE_IMAGE:-grafana/pyroscope:2.0.2}
    command: ["server"]
    volumes:
      - pyroscope_data:/var/lib/pyroscope
    ports:
      - "4040:4040"
    networks:
      - webhook_net

  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:2.10.5}
    user: "0:0"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ../../deploy/observability/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
    networks:
      - webhook_net

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.7.2}
    command: ["-config.file=/etc/loki/local-config.yml"]
    volumes:
      - ../../deploy/observability/loki.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - webhook_net

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:13.0.1}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ../../deploy/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ../../deploy/observability/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ../../grafana:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      alloy:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
      pyroscope:
        condition: service_started
    networks:
      - webhook_net

volumes:
  alertmanager_data:
    name: webhookwise_alertmanager_data
  alloy_data:
    name: webhookwise_alloy_data
  grafana_data:
    name: webhookwise_grafana_data
  loki_data:
    name: webhookwise_loki_data
  prometheus_data:
    name: webhookwise_prometheus_data
  pyroscope_data:
    name: webhookwise_pyroscope_data
  tempo_data:
    name: webhookwise_tempo_data

networks:
  webhook_net:
    name: webhookwise_webhook_net
    external: true
