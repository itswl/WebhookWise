# WebhookWise application services
#
# Daily business stack (run from the repo root, automatically includes PostgreSQL / Redis):
#   docker compose up -d
#
# Using cloud services (RDS / ElastiCache etc.):
#   Set DATABASE_URL and REDIS_URL in .env to point at the cloud instances, then:
#   docker compose -p webhookwise --env-file .env -f deploy/compose/docker-compose.yml up -d

x-app-observability-env: &app-observability-env
  OTEL_ENABLED: ${OTEL_ENABLED:-false}
  OTEL_CONSOLE_EXPORTER: ${OTEL_CONSOLE_EXPORTER:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
  OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-60000}
  OTEL_LOGS_ENABLED: ${OTEL_LOGS_ENABLED:-false}
  OTEL_TRACES_ENABLED: ${OTEL_TRACES_ENABLED:-true}
  OTEL_SEMCONV_STABILITY_OPT_IN: ${OTEL_SEMCONV_STABILITY_OPT_IN:-http}
  OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
  OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.1}
  OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-webhookwise}
  OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-3.4.0}
  OTEL_SEMCONV_VERSION: ${OTEL_SEMCONV_VERSION:-1.41.0}
  OTEL_SCHEMA_URL: ${OTEL_SCHEMA_URL:-https://opentelemetry.io/schemas/1.41.0}
  OTEL_METRICS_EXEMPLAR_FILTER: ${OTEL_METRICS_EXEMPLAR_FILTER:-trace_based}
  PYROSCOPE_ENABLED: ${PYROSCOPE_ENABLED:-false}
  PYROSCOPE_SERVER_ADDRESS: ${PYROSCOPE_SERVER_ADDRESS:-}
  PYROSCOPE_SPAN_PROFILES_ENABLED: ${PYROSCOPE_SPAN_PROFILES_ENABLED:-true}

networks:
  webhook_net:

services:
  migrate:
    build:
      context: ../..
    container_name: webhook-migrate
    restart: "no"
    env_file:
      - ../../.env
    environment:
      RUN_MODE: migrate
      APP_ENV: ${COMPOSE_APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-3.4.0}
      PYTHONPATH: /app
      OTEL_ENABLED: "false"
      OTEL_CONSOLE_EXPORTER: "false"
      DATABASE_URL: ${DATABASE_URL}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-30000}
    volumes:
      - ../../.env:/app/.env
    networks:
      - webhook_net

  webhook-service:
    build:
      context: ../..
    container_name: webhook-receiver
    restart: unless-stopped

    # TCP tuning: improve high-concurrency connection handling
    sysctls:
      # Listen queue limit; the default 128 is insufficient for traffic spikes
      net.core.somaxconn: 4096
      # Allow sockets in TIME_WAIT state to be reused, speeding up port recycling
      net.ipv4.tcp_tw_reuse: 1
      # Widen the local port range to support more outbound connections (forwarding / OpenClaw / Feishu)
      net.ipv4.ip_local_port_range: "1024 65535"
      # SYN half-open queue limit, prevents packet loss during a SYN flood
      net.ipv4.tcp_max_syn_backlog: 8192

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    ports:
      - "8000:8000"   # Expose only the business service

    env_file:
      - ../../.env

    environment:
      <<: *app-observability-env
      RUN_MODE: api
      PORT: ${PORT:-8000}
      APP_ENV: ${COMPOSE_APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-3.4.0}
      API_WORKERS: ${API_WORKERS:-2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      API_KEY: ${API_KEY}
      REQUIRE_WEBHOOK_AUTH: ${REQUIRE_WEBHOOK_AUTH:-true}
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      BACKGROUND_SCAN_INTERVAL_SECONDS: ${BACKGROUND_SCAN_INTERVAL_SECONDS:-300}
      FORWARD_OUTBOX_STALE_SECONDS: ${FORWARD_OUTBOX_STALE_SECONDS:-300}
      TASKIQ_RESULT_TTL_SECONDS: ${TASKIQ_RESULT_TTL_SECONDS:-86400}
      TASKIQ_SCHEDULE_REDIS_URL: ${TASKIQ_SCHEDULE_REDIS_URL:-}
      TASKIQ_SCHEDULE_SCAN_BUFFER_SIZE: ${TASKIQ_SCHEDULE_SCAN_BUFFER_SIZE:-1000}
      OTEL_SERVICE_NAME: webhookwise-api
      PYROSCOPE_APPLICATION_NAME: webhookwise-api

    volumes:
      - ../../.env:/app/.env # Mount the .env file

    depends_on:
      migrate:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "python3", "-m", "scripts.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - webhook_net

  worker:
    build:
      context: ../..
    # No fixed container_name here: this service is intended to scale horizontally.
    # Example: docker compose up -d --scale worker=3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    env_file:
      - ../../.env
    environment:
      <<: *app-observability-env
      RUN_MODE: worker
      APP_ENV: ${COMPOSE_APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-3.4.0}
      PYTHONPATH: /app
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      TASKIQ_WORKERS: ${TASKIQ_WORKERS:-1}
      TASKIQ_MAX_ASYNC_TASKS: ${TASKIQ_MAX_ASYNC_TASKS:-20}
      RUNTIME_HEARTBEAT_INTERVAL_SECONDS: ${RUNTIME_HEARTBEAT_INTERVAL_SECONDS:-10}
      RUNTIME_HEARTBEAT_TTL_SECONDS: ${RUNTIME_HEARTBEAT_TTL_SECONDS:-45}
      HOST: 0.0.0.0
      BACKGROUND_SCAN_INTERVAL_SECONDS: ${BACKGROUND_SCAN_INTERVAL_SECONDS:-300}
      FORWARD_OUTBOX_STALE_SECONDS: ${FORWARD_OUTBOX_STALE_SECONDS:-300}
      TASKIQ_RESULT_TTL_SECONDS: ${TASKIQ_RESULT_TTL_SECONDS:-86400}
      TASKIQ_SCHEDULE_REDIS_URL: ${TASKIQ_SCHEDULE_REDIS_URL:-}
      TASKIQ_SCHEDULE_SCAN_BUFFER_SIZE: ${TASKIQ_SCHEDULE_SCAN_BUFFER_SIZE:-1000}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-30000}
      OTEL_SERVICE_NAME: webhookwise-worker
      PYROSCOPE_APPLICATION_NAME: webhookwise-worker
    healthcheck:
      # The worker exposes no HTTP port; scripts.healthcheck branches on
      # RUN_MODE=worker to DB/Redis checks plus the worker heartbeat. This also
      # detects a wedged-but-alive consumer instead of only checking dependencies.
      test: ["CMD", "python3", "-m", "scripts.healthcheck"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s
    volumes:
      - ../../.env:/app/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      webhook-service:
        condition: service_healthy
    networks:
      - webhook_net

  scheduler:
    build:
      context: ../..
    container_name: webhook-scheduler
    # Keep scheduler as a single instance. Scaling it would duplicate scheduled task dispatches.
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 64M
    env_file:
      - ../../.env
    environment:
      <<: *app-observability-env
      RUN_MODE: scheduler
      APP_ENV: ${COMPOSE_APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-3.4.0}
      PYTHONPATH: /app
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      BACKGROUND_SCAN_INTERVAL_SECONDS: ${BACKGROUND_SCAN_INTERVAL_SECONDS:-300}
      TASKIQ_SCHEDULER_UPDATE_INTERVAL_SECONDS: ${TASKIQ_SCHEDULER_UPDATE_INTERVAL_SECONDS:-30}
      TASKIQ_SCHEDULER_LOOP_INTERVAL_SECONDS: ${TASKIQ_SCHEDULER_LOOP_INTERVAL_SECONDS:-5}
      TASKIQ_RESULT_TTL_SECONDS: ${TASKIQ_RESULT_TTL_SECONDS:-86400}
      TASKIQ_SCHEDULE_REDIS_URL: ${TASKIQ_SCHEDULE_REDIS_URL:-}
      TASKIQ_SCHEDULE_SCAN_BUFFER_SIZE: ${TASKIQ_SCHEDULE_SCAN_BUFFER_SIZE:-1000}
      RUNTIME_HEARTBEAT_INTERVAL_SECONDS: ${RUNTIME_HEARTBEAT_INTERVAL_SECONDS:-10}
      RUNTIME_HEARTBEAT_TTL_SECONDS: ${RUNTIME_HEARTBEAT_TTL_SECONDS:-45}
      FORWARD_OUTBOX_STALE_SECONDS: ${FORWARD_OUTBOX_STALE_SECONDS:-300}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-30000}
      OTEL_SERVICE_NAME: webhookwise-scheduler
      PYROSCOPE_APPLICATION_NAME: webhookwise-scheduler
    healthcheck:
      test: ["CMD", "python3", "-m", "scripts.healthcheck"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s
    volumes:
      - ../../.env:/app/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - webhook_net

  # Scheduled database backups. Runs scripts.ops.backup_db on a fixed interval
  # (default daily), writing pg_dump custom-format dumps + .sha256 checksums to
  # a host-mounted directory, then pruning per BACKUP_RETENTION_DAYS. Disabled
  # by default unless started explicitly: `docker compose --profile backup up -d`.
  backup:
    build:
      context: ../..
    container_name: webhook-backup
    profiles: ["backup"]
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[backup] starting; interval=${BACKUP_INTERVAL_SECONDS:-86400}s dir=${BACKUP_DIR:-/backups}";
        while true; do
          python3 -m scripts.ops.backup_db --verbose || echo "[backup] run failed (will retry next interval)";
          sleep "${BACKUP_INTERVAL_SECONDS:-86400}";
        done
    env_file:
      - ../../.env
    environment:
      APP_ENV: ${COMPOSE_APP_ENV:-development}
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL}
      OTEL_ENABLED: "false"
      BACKUP_DIR: ${BACKUP_DIR:-/backups}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_COMPRESS: ${BACKUP_COMPRESS:-true}
    volumes:
      - ../../.env:/app/.env
      - ${BACKUP_HOST_DIR:-./backups}:/backups
    # No depends_on: postgres here — backup connects via DATABASE_URL, so this
    # service stays valid when the app-only compose file is run without infra
    # (a cloud DB, per deploy/compose/README.md). backup_db retries on startup.
    networks:
      - webhook_net
