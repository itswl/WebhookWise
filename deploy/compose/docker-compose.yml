# WebhookWise 应用服务
#
# 本地开发（自带基础设施）：
#   docker compose -f deploy/compose/docker-compose.infra.yml -f deploy/compose/docker-compose.yml up -d
#
# 使用云服务（RDS / ElastiCache 等）：
#   在 .env 中设置 DATABASE_URL 和 REDIS_URL 指向云实例，然后：
#   docker compose -f deploy/compose/docker-compose.yml up -d

networks:
  webhook_net:

services:
  migrate:
    build:
      context: ../..
    container_name: webhook-migrate
    restart: "no"
    env_file:
      - ../../.env
    environment:
      RUN_MODE: migrate
      APP_ENV: ${COMPOSE_APP_ENV:-development}
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-30000}
    volumes:
      - ../../.env:/app/.env
    networks:
      - webhook_net

  webhook-service:
    build:
      context: ../..
    container_name: webhook-receiver
    restart: unless-stopped

    # TCP 调优：提升高并发连接处理能力
    sysctls:
      # 监听队列上限，默认 128 不足以应对突发流量
      net.core.somaxconn: 4096
      # 允许 TIME_WAIT 状态的 socket 被重新使用，加快端口回收
      net.ipv4.tcp_tw_reuse: 1
      # 扩大本地端口范围，支撑更多出站连接（转发 / OpenClaw / 飞书）
      net.ipv4.ip_local_port_range: "1024 65535"
      # SYN 半连接队列上限，防止 SYN Flood 时丢包
      net.ipv4.tcp_max_syn_backlog: 8192

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    ports:
      - "8000:8000"   # 只暴露业务服务

    env_file:
      - ../../.env

    environment:
      RUN_MODE: api
      PORT: ${PORT:-8000}
      APP_ENV: ${COMPOSE_APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      API_KEY: ${API_KEY}
      REQUIRE_WEBHOOK_AUTH: ${REQUIRE_WEBHOOK_AUTH:-true}
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-5}
      BACKGROUND_SCAN_INTERVAL_SECONDS: ${BACKGROUND_SCAN_INTERVAL_SECONDS:-300}
      FORWARD_OUTBOX_STALE_SECONDS: ${FORWARD_OUTBOX_STALE_SECONDS:-300}
      OTEL_SERVICE_NAME: webhookwise-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SEMCONV_STABILITY_OPT_IN: ${OTEL_SEMCONV_STABILITY_OPT_IN:-http}

    volumes:
      - ../../.env:/app/.env # 挂载 .env 文件

    depends_on:
      migrate:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "python3", "-m", "scripts.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - webhook_net

  worker:
    build:
      context: ../..
    # No fixed container_name here: this service is intended to scale horizontally.
    # Example: docker compose -f deploy/compose/docker-compose.infra.yml -f deploy/compose/docker-compose.yml up -d --scale worker=3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    env_file:
      - ../../.env
    environment:
      RUN_MODE: worker
      APP_ENV: ${COMPOSE_APP_ENV:-development}
      PYTHONPATH: /app
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-5}
      HOST: 0.0.0.0
      BACKGROUND_SCAN_INTERVAL_SECONDS: ${BACKGROUND_SCAN_INTERVAL_SECONDS:-300}
      FORWARD_OUTBOX_STALE_SECONDS: ${FORWARD_OUTBOX_STALE_SECONDS:-300}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-30000}
      OTEL_SERVICE_NAME: webhookwise-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SEMCONV_STABILITY_OPT_IN: ${OTEL_SEMCONV_STABILITY_OPT_IN:-http}
    volumes:
      - ../../.env:/app/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      webhook-service:
        condition: service_healthy
    networks:
      - webhook_net

  scheduler:
    build:
      context: ../..
    container_name: webhook-scheduler
    # Keep scheduler as a single instance. Scaling it would duplicate scheduled task dispatches.
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 64M
    env_file:
      - ../../.env
    environment:
      RUN_MODE: scheduler
      APP_ENV: ${COMPOSE_APP_ENV:-development}
      PYTHONPATH: /app
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      BACKGROUND_SCAN_INTERVAL_SECONDS: ${BACKGROUND_SCAN_INTERVAL_SECONDS:-300}
      TASKIQ_SCHEDULER_UPDATE_INTERVAL_SECONDS: ${TASKIQ_SCHEDULER_UPDATE_INTERVAL_SECONDS:-30}
      TASKIQ_SCHEDULER_LOOP_INTERVAL_SECONDS: ${TASKIQ_SCHEDULER_LOOP_INTERVAL_SECONDS:-1}
      FORWARD_OUTBOX_STALE_SECONDS: ${FORWARD_OUTBOX_STALE_SECONDS:-300}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-30000}
      OTEL_SERVICE_NAME: webhookwise-scheduler
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SEMCONV_STABILITY_OPT_IN: ${OTEL_SEMCONV_STABILITY_OPT_IN:-http}
    healthcheck:
      test: ["CMD", "python3", "-m", "scripts.healthcheck"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s
    volumes:
      - ../../.env:/app/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - webhook_net
