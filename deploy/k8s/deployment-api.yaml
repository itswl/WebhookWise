apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhookwise-api
  labels:
    app.kubernetes.io/name: webhookwise
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: webhookwise
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhookwise
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: webhookwise
      containers:
        - name: webhookwise-api
          image: ghcr.io/itswl/webhookwise:3.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: webhookwise-config
            - secretRef:
                name: webhookwise-secret
          env:
            - name: RUN_MODE
              value: api
            - name: OTEL_SERVICE_NAME
              value: webhookwise-api
          ports:
            - name: http
              containerPort: 8000
          livenessProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
