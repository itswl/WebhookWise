apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhookwise-api
  labels:
    app.kubernetes.io/name: webhookwise
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: webhookwise
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhookwise
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: webhookwise
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Spread the 2 api replicas across nodes so a single node failure does not
      # take out all ingress. ScheduleAnyway keeps scheduling possible on a
      # single-node cluster (degrades to best-effort rather than blocking).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: webhookwise
              app.kubernetes.io/component: api
      initContainers:
        # Gate app start on the migration Job having applied the schema. The
        # plain migrate Job and these Deployments are created concurrently by
        # `kubectl apply -k`, so without this gate pods can serve against an
        # un-migrated schema.
        - name: wait-for-migrations
          image: ghcr.io/itswl/webhookwise:3.4.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until RUN_MODE=migrate python3 -m scripts.healthcheck; do
                echo "waiting for database migrations to complete..."
                sleep 3
              done
          envFrom:
            - configMapRef:
                name: webhookwise-config
            - secretRef:
                name: webhookwise-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: webhookwise-api
          image: ghcr.io/itswl/webhookwise:3.4.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: webhookwise-config
            - secretRef:
                name: webhookwise-secret
          env:
            - name: RUN_MODE
              value: api
            - name: OTEL_SERVICE_NAME
              value: webhookwise-api
          ports:
            - name: http
              containerPort: 8000
          livenessProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # Writable scratch dir so readOnlyRootFilesystem can stay enabled
        # (jemalloc / OTel / temp files write under /tmp).
        - name: tmp
          emptyDir: {}
