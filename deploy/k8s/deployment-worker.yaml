apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhookwise-worker
  labels:
    app.kubernetes.io/name: webhookwise
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: webhookwise
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhookwise
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: webhookwise
      containers:
        - name: webhookwise-worker
          image: ghcr.io/itswl/webhookwise:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: webhookwise-config
            - secretRef:
                name: webhookwise-secret
          env:
            - name: RUN_MODE
              value: worker
            - name: OTEL_SERVICE_NAME
              value: webhookwise-worker
          livenessProbe:
            exec:
              command: ["python3", "-m", "scripts.healthcheck"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python3", "-m", "scripts.healthcheck"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
