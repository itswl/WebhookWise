apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhookwise-worker
  labels:
    app.kubernetes.io/name: webhookwise
    app.kubernetes.io/component: worker
spec:
  # No replicas here: the HPA (hpa-worker.yaml) owns the worker replica count.
  # Pinning it would fight the HPA on every `kubectl apply -k` (reset to this
  # value, clobbering any scale-out) until the HPA re-reconciles.
  selector:
    matchLabels:
      app.kubernetes.io/name: webhookwise
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhookwise
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: webhookwise
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Spread the 2 worker replicas across nodes so a single node failure does
      # not take out all workers. ScheduleAnyway keeps scheduling possible on a
      # single-node cluster (degrades to best-effort rather than blocking).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: webhookwise
              app.kubernetes.io/component: worker
      initContainers:
        - name: wait-for-migrations
          image: ghcr.io/itswl/webhookwise:3.0.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until RUN_MODE=migrate python3 -m scripts.healthcheck; do
                echo "waiting for database migrations to complete..."
                sleep 3
              done
          envFrom:
            - configMapRef:
                name: webhookwise-config
            - secretRef:
                name: webhookwise-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: webhookwise-worker
          image: ghcr.io/itswl/webhookwise:3.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: webhookwise-config
            - secretRef:
                name: webhookwise-secret
          env:
            - name: RUN_MODE
              value: worker
            - name: OTEL_SERVICE_NAME
              value: webhookwise-worker
          livenessProbe:
            exec:
              command: ["python3", "-m", "scripts.healthcheck"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python3", "-m", "scripts.healthcheck"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          # Give a slow cold start (deps connecting, OTel init) up to 2 minutes
          # before liveness starts counting, matching the api deployment.
          startupProbe:
            exec:
              command: ["python3", "-m", "scripts.healthcheck"]
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 24
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
