apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: webhookwise
commonLabels:
  app.kubernetes.io/part-of: webhookwise
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - service-api.yaml
  - redis-service.yaml
  - redis-statefulset.yaml
  - postgres-service.yaml
  - postgres-statefulset.yaml
  - deployment-api.yaml
  - deployment-worker.yaml
  - deployment-scheduler.yaml
  - job-migrate.yaml
  - pdb.yaml
  - hpa-worker.yaml
  - networkpolicy.yaml
images:
  # newTag is the single source of truth for the deployed image tag (the
  # hard-coded image: refs in the deployment/job manifests are placeholders this
  # transformer overrides). A matching v3.3.0 release tag must be cut so CI
  # publishes ghcr.io/itswl/webhookwise:3.3.0 before this is applied.
  - name: ghcr.io/itswl/webhookwise
    newTag: 3.3.0
