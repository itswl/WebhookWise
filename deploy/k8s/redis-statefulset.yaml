apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: webhookwise-redis
  labels:
    app.kubernetes.io/name: webhookwise
    app.kubernetes.io/component: redis
spec:
  serviceName: webhookwise-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webhookwise
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhookwise
        app.kubernetes.io/component: redis
    spec:
      # redis:7-alpine runs as uid 999 (the "redis" user). Pin it and set
      # fsGroup so the AOF data dir is group-writable, mirroring the non-root
      # posture the app Deployments already use.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
