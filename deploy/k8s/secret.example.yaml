apiVersion: v1
kind: Secret
metadata:
  name: webhookwise-secret
  namespace: webhookwise
  labels:
    app.kubernetes.io/name: webhookwise
type: Opaque
stringData:
  DATABASE_URL: postgresql://webhook_user:replace-me-postgres-password@webhookwise-postgres:5432/webhooks
  WEBHOOK_SECRET: replace-me-webhook-secret
  API_KEY: replace-me-api-key
  ADMIN_WRITE_KEY: replace-me-admin-write-key
  OPENAI_API_KEY: replace-me-openai-api-key
  POSTGRES_PASSWORD: replace-me-postgres-password
