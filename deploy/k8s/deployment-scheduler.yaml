apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhookwise-scheduler
  labels:
    app.kubernetes.io/name: webhookwise
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webhookwise
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhookwise
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: webhookwise
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-migrations
          image: ghcr.io/itswl/webhookwise:3.0.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until RUN_MODE=migrate python3 -m scripts.healthcheck; do
                echo "waiting for database migrations to complete..."
                sleep 3
              done
          envFrom:
            - configMapRef:
                name: webhookwise-config
            - secretRef:
                name: webhookwise-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: webhookwise-scheduler
          image: ghcr.io/itswl/webhookwise:3.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: webhookwise-config
            - secretRef:
                name: webhookwise-secret
          env:
            - name: RUN_MODE
              value: scheduler
            - name: OTEL_SERVICE_NAME
              value: webhookwise-scheduler
          livenessProbe:
            exec:
              command: ["python3", "-m", "scripts.healthcheck"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python3", "-m", "scripts.healthcheck"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
