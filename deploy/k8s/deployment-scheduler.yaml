apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhookwise-scheduler
  labels:
    app.kubernetes.io/name: webhookwise
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webhookwise
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhookwise
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: webhookwise
      containers:
        - name: webhookwise-scheduler
          image: ghcr.io/itswl/webhookwise:3.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: webhookwise-config
            - secretRef:
                name: webhookwise-secret
          env:
            - name: RUN_MODE
              value: scheduler
            - name: OTEL_SERVICE_NAME
              value: webhookwise-scheduler
          livenessProbe:
            exec:
              command: ["python3", "-m", "scripts.healthcheck"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python3", "-m", "scripts.healthcheck"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
