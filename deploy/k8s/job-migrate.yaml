apiVersion: batch/v1
kind: Job
metadata:
  name: webhookwise-migrate
  labels:
    app.kubernetes.io/name: webhookwise
    app.kubernetes.io/component: migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhookwise
        app.kubernetes.io/component: migrate
    spec:
      serviceAccountName: webhookwise
      restartPolicy: OnFailure
      containers:
        - name: webhookwise-migrate
          image: ghcr.io/itswl/webhookwise:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: webhookwise-config
            - secretRef:
                name: webhookwise-secret
          env:
            - name: RUN_MODE
              value: migrate
            - name: OTEL_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
