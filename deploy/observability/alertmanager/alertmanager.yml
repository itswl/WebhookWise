global:
  resolve_timeout: 5m

route:
  receiver: webhookwise-local
  group_by: ["alertname", "service", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: webhookwise-local
    webhook_configs:
      - url: http://webhook-service:8000/webhook/alertmanager
        send_resolved: true
        max_alerts: 20

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "service"]
