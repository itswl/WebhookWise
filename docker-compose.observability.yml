# Optional local observability stack:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d --build

services:
  webhook-service:
    environment:
      OTEL_ENABLED: "true"
      OTEL_CONSOLE_EXPORTER: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: webhookwise-api
    depends_on:
      otel-collector:
        condition: service_started

  worker:
    environment:
      OTEL_ENABLED: "true"
      OTEL_CONSOLE_EXPORTER: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: webhookwise-worker
    depends_on:
      otel-collector:
        condition: service_started

  scheduler:
    environment:
      OTEL_ENABLED: "true"
      OTEL_CONSOLE_EXPORTER: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: webhookwise-scheduler
    depends_on:
      otel-collector:
        condition: service_started

  migrate:
    environment:
      OTEL_ENABLED: "false"
      OTEL_CONSOLE_EXPORTER: "false"

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:latest}
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./deploy/observability/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - webhook_net

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - webhook_net

  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:latest}
    user: "0:0"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./deploy/observability/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
    networks:
      - webhook_net

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:latest}
    command: ["-config.file=/etc/loki/local-config.yml"]
    volumes:
      - ./deploy/observability/loki.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - webhook_net

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - webhook_net

volumes:
  grafana_data:
  loki_data:
  prometheus_data:
  tempo_data:
