# Optional all-in-one topology:
#   docker compose -f docker-compose.yml -f docker-compose.supervisor.yml up -d --build
#
# This keeps the default docker-compose.yml on the recommended multi-container
# topology, while RUN_MODE=all uses supervisord to run api/worker/scheduler in a
# single application container.

services:
  webhook-service:
    environment:
      RUN_MODE: all
      API_WORKERS: ${API_WORKERS:-4}

  worker:
    profiles:
      - separate-processes

  scheduler:
    profiles:
      - separate-processes
